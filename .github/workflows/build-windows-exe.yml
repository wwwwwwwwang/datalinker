name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build app (portable exe + NSIS installer)
        run: pnpm tauri build --bundles nsis

      - name: Prepare portable EXE
        run: Copy-Item src-tauri/target/release/datalinker.exe src-tauri/target/release/datalinker-portable.exe

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalinker-portable-exe
          path: src-tauri/target/release/datalinker-portable.exe
          if-no-files-found: error

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalinker-nsis-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Compute next semantic tag
        id: next_tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git fetch --tags --force
          $latest = git tag -l "v*" --sort=-v:refname | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($latest)) {
            $next = "v0.1.0"
          } elseif ($latest -match '^v(\d+)\.(\d+)\.(\d+)$') {
            $major = [int]$Matches[1]
            $minor = [int]$Matches[2]
            $patch = [int]$Matches[3] + 1
            $next = "v$major.$minor.$patch"
          } else {
            throw "Latest tag format is invalid: $latest (expected vX.Y.Z)"
          }
          "tag=$next" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $tag = "${{ steps.next_tag.outputs.tag }}"
          if (-not $tag) { throw "Tag output is empty" }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $existing = git tag -l $tag
          if ($existing) {
            Write-Host "Tag already exists: $tag"
            exit 0
          }
          git tag $tag
          git push origin $tag

      - name: Publish GitHub Release (auto tag)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/datalinker-portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
