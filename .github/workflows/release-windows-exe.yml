name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build app (portable exe + NSIS installer)
        run: pnpm tauri build --bundles nsis

      - name: Prepare portable EXE
        run: Copy-Item src-tauri/target/release/datalinker.exe src-tauri/target/release/datalinker-portable.exe

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalinker-portable-exe-${{ github.ref_name }}
          path: src-tauri/target/release/datalinker-portable.exe
          if-no-files-found: error

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalinker-nsis-exe-${{ github.ref_name }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/datalinker-portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
